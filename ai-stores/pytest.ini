[pytest]
# Every test coroutine is auto-marked; no per-test @pytest.mark.asyncio needed.
asyncio_mode = auto
testpaths = tests
# Put the app package root (where main.py lives) on sys.path for `import main`.
pythonpath = .
# The browser E2E suite (tests/e2e) is opt-in — it needs Playwright + a booted
# server. Exclude it from the default in-process run; invoke `pytest tests/e2e`
# explicitly (or via the CI E2E job) to run it.
addopts = -ra -q --ignore=tests/e2e
markers =
    e2e: end-to-end browser tests (Playwright; run explicitly with `pytest tests/e2e`).
filterwarnings =
    ignore::DeprecationWarning
